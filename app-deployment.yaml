apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo
  template:
    metadata:
      labels:
        app: todo
    spec:
      containers:
      - name: app
        image: todo-app:latest
        imagePullPolicy: Never
        env:
        - name: DB_HOST
          value: db
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: tododb
        - name: DB_USER
          value: todouser
        - name: DB_PASS
          value: todopass
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: app
spec:
  selector:
    app: todo
  type: NodePort
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30000
