apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo
  template:
    metadata:
      labels:
        app: todo
      annotations:
        # Estado: CORREGIDA
    spec:
      automountServiceAccountToken: false
      containers:
      - name: app
        image: todo-app:1.0
        imagePullPolicy: Never
        env:
        - name: DB_HOST
          value: db
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: tododb
        - name: DB_USER
          value: todouser
        - name: DB_PASS
          value: todopass
        ports:
        - containerPort: 5000
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        # CORRECCIÓN 12: Security context configurado
        # Vulnerabilidades originales:
        # - Pod or Container Without Security Context (LOW) → CORREGIDA
        # - Container Running As Root (MEDIUM) → CORREGIDA
        # - Privilege Escalation Allowed (HIGH) → CORREGIDA
        # - NET_RAW Capabilities Not Being Dropped (MEDIUM) → CORREGIDA
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        # CORRECCIÓN 13: Readiness y Liveness probes
        # Vulnerabilidades originales:
        # - Readiness Probe Is Not Configured (MEDIUM) → CORREGIDA
        # - Liveness Probe Is Not Defined (INFO) → CORREGIDA
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: app
spec:
  selector:
    app: todo
  type: NodePort
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30000
